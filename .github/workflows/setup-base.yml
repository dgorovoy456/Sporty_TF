name: Base (Ubuntu + Python)
on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.10"
      run-tox:
        required: false
        type: boolean
        default: false
      run-system-tests:
        required: false
        type: boolean
        default: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Run tox
        if: ${{ inputs.run-tox }}
        run: |
          python -m pip install --upgrade pip
          pip install tox
          tox

      - name: Run system tests
        working-directory: ./
        if: ${{ inputs.run-system-tests }}
        env:
          X_USER_ID: ${{ secrets.X_USER_ID }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest -v -s