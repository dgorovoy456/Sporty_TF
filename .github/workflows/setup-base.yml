name: Base (Ubuntu + Python)
on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.10"
      run-tox:
        required: false
        type: boolean
        default: false
      run-system-tests:
        required: false
        type: boolean
        default: false
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Run tox
        if: ${{ inputs.run-tox }}
        run: |
          python -m pip install --upgrade pip
          pip install tox
          tox

      - name: Run system tests
        working-directory: ./
        if: ${{ inputs.run-system-tests }}
        env:
          X_USER_ID: ${{ secrets.X_USER_ID }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest

      - name: Upload test artifacts
        if: always() && inputs.run-system-tests
        uses: actions/upload-artifact@v4
        with:
          name: pytest-execution-logs
          path: reports/

      - name: Publish test summary
        if: always() && inputs.run-system-tests
        uses: test-summary/action@v2
        with:
          paths: "reports/junit_report.xml"

      - name: Publish test results to PR
        if: always() && inputs.run-system-tests
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "reports/junit_report.xml"
